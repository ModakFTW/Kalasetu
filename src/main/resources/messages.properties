# Our Story Page
story.title=Our Story - KalaSetu
story.hero_title=Bridging Culture & Canvas
story.hero_desc=KalaSetu, which translates to "The Bridge of Art", is dedicated to empowering local artisans by bringing their authentic crafts to a global stage. We exist to ensure culture thrives in the digital age.
story.pillar1_title=Authenticity First
story.pillar1_desc=We celebrate the raw, unfiltered expression of traditional and contemporary artists. Every piece on KalaSetu tells a genuine story from the hands that crafted it.
story.pillar2_title=Empowering Creators
story.pillar2_desc=KalaSetu gives artists complete control over their catalog, pricing, and custom works, allowing them to earn a fair living directly from their passion without unfair middlemen.
story.pillar3_title=Community Guardianship
story.pillar3_desc=We protect creator IP with strict, community-driven moderation. We believe the true value of art is rooted in respecting the originator.
story.voices_title=Voices from the Studio
story.quote1_text="Before KalaSetu, my traditional pottery was confined to local street fairs. Now, I receive custom requests from collectors halfway across the world. The platform respects my pricing and protects my designs."
story.quote1_role=Ceramic Sculptor & Potter
story.quote2_text="The IP protection system here is a game-changer. As a digital illustrator, seeing my work constantly stolen was disheartening. KalaSetu is the first marketplace that actively defends my originality."
story.quote2_role=Digital Canvas Illustrator

