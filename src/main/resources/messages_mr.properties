# Our Story Page
story.title=आमची कथा - कलासेतू
story.hero_title=संस्कृती आणि कॅनव्हास जोडणे
story.hero_desc=कलासेतू, ज्याचा अर्थ "कलाचा पूल" असा होतो, स्थानिक कारागिरांना त्यांची अस्सल कला जागतिक स्तरावर आणून सक्षम करण्यासाठी समर्पित आहे। डिजिटल युगात संस्कृती बहरावी यासाठी आम्ही प्रयत्नशील आहोत।
story.pillar1_title=अस्सलपणा प्रथम
story.pillar1_desc=आम्ही पारंपारिक आणि समकालीन कलाकारांच्या कच्च्या, अनफिल्टर्ड अभिव्यक्तीचा उत्सव साजरा करतो। कलासेतूवरील प्रत्येक वस्तू ती घडवणाऱ्या हातांची खरी कथा सांगते।
story.pillar2_title=निर्मात्यांना सक्षम करणे
story.pillar2_desc=कलासेतू कलाकारांना त्यांच्या कॅटलॉग, किंमत आणि सानुकूलनावर पूर्ण नियंत्रण देते, ज्यामुळे त्यांना कोणत्याही मध्यस्थाशिवाय त्यांच्या आवडीच्या कलेतून सन्मानपूर्वक जीवन जगता येते।
story.pillar3_title=सामुदायिक पालकत्व
story.pillar3_desc=आम्ही कडक, समुदाय-आधारित नियंत्रणासह निर्मात्यांच्या बौद्धिक संपदेचे (IP) रक्षण करतो। आमचा विश्वास आहे की कलेचे खरे मूल्य निर्मात्याचा आदर करण्यात आहे।
story.voices_title=स्टुडिओतून आवाज
story.quote1_text="कलासेतूच्या आधी, माझी पारंपारिक मातीची भांडी स्थानिक बाजारपेठेपुरती मर्यादित होती। आता, मला जगभरातील संग्राहकांकडून सानुकूल विनंत्या मिळतात। हे प्लॅटफॉर्म माझ्या किमतींचा आदर करते आणि माझ्या डिझाइनचे रक्षण करते।"
story.quote1_role=सिरॅमिक शिल्पकार आणि कुंभार
story.quote2_text="येथील आयपी संरक्षण प्रणाली क्रांतिकारी आहे। एक डिजिटल चित्रकार म्हणून, माझे काम वारंवार चोरी होताना पाहणे निराशाजनक होते। कलासेतू हे पहिले मार्केटप्लेस आहे जे सक्रियपणे माझ्या मौलिकतेचे रक्षण करते।"
story.quote2_role=डिजिटल कॅनव्हास इलस्ट्रेटर

