home.pillar1_desc=थेट हातातून घरापर्यंत। आम्ही खात्री करतो की प्रत्येक वस्तू तिच्या प्रादेशिक वारसा आणि वैयक्तिक कारागिरीसाठी पडताळली गेली आहे।
home.pillar2_title=सशक्तीकरण
home.pillar2_desc=दुर्गम गावातील कारागिरांना आणि स्थानिक उत्पादकांना जागतिक पोहोच देऊन पारंपारिक कारागिरी टिकवून ठेवा।
home.pillar3_title=शाश्वत
home.pillar3_desc=पर्यावरणपूरक साहित्य आणि नैतिक उत्पादन चक्र। सौंदर्य जे पर्यावरण आणि त्याच्या निर्मात्यांचा आदर करते।
home.testimonials_small=प्रशंसापत्रे
home.testimonials_title=आमच्या जागतिक समुदायाचे आवाज।
home.test1_quote="येथे खरेदी करणे म्हणजे बुटीक गॅलरीमध्ये फिरण्यासारखे वाटते। प्रत्येक कारागिरामागील कथा खरेदीला खूप अर्थपूर्ण बनवते।"
home.test1_role=कला सल्लागार
home.test2_quote="मला मिळालेला सिरॅमिक संच स्वयंपाकघरातील सामानापेक्षा अधिक काहीतरी आहे; तो संवादाचा एक विषय आहे। तुम्ही मातीमध्ये कारागिराच्या बोटांचे ठसे अनुभवू शकता।"
home.test2_role=इंटिरिअर आर्किटेक्ट
home.test3_quote="कलासेतूने मला अशा गावांतील विणकरांशी जोडले आहे ज्यांच्याबद्दल मी फक्त वाचले आहे। हाताने कातलेल्या रेशमाची गुणवत्ता अतुलनीय आहे।"
