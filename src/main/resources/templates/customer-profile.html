<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Customer Profile | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content">
        <div style="max-width: 800px; margin: 0 auto;">
            
            <h1 class="page-title font-serif" th:text="${'Profile: ' + customer.name}" style="text-align: left;">Customer Profile</h1>
            <p style="color: var(--on-surface-variant); margin-bottom: var(--spacing-xl);" th:text="${customer.email}">Customer Email</p>

            <div th:if="${param.orderSuccess}" style="background-color: var(--secondary); color: white; padding: 1rem; border-radius: var(--border-radius); margin-bottom: var(--spacing-md); text-align: center; box-shadow: var(--shadow-soft);">
                <span class="material-symbols-outlined" style="vertical-align: middle; margin-right: 0.5rem;">check_circle</span> 
                Your order has been placed successfully!
            </div>

            <h2 class="font-serif" style="border-bottom: 1px solid var(--outline-variant); padding-bottom: 0.5rem; margin-bottom: var(--spacing-lg);">Your Orders</h2>
            
            <div th:if="${#lists.isEmpty(orders)}" style="text-align: center; padding: 4rem; color: var(--outline); background: window; border-radius: var(--border-radius-lg);">
                <span class="material-symbols-outlined" style="font-size: 4rem; opacity: 0.5; margin-bottom: 1rem; display: block;">shopping_basket</span>
                <p style="font-size: 1.2rem;">You haven't placed any orders yet.</p>
                <a th:href="@{/store}" class="btn btn-primary" style="margin-top: 1rem;">Shop Now</a>
            </div>

            <div th:unless="${#lists.isEmpty(orders)}" style="background: white; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-soft); overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead style="background-color: var(--surface-low); border-bottom: 2px solid var(--surface-container);">
                        <tr>
                            <th style="padding: 1rem; color: var(--on-surface-variant); font-weight: 600;">Date</th>
                            <th style="padding: 1rem; color: var(--on-surface-variant); font-weight: 600;">Product</th>
                            <th style="padding: 1rem; color: var(--on-surface-variant); font-weight: 600;">Price</th>
                            <th style="padding: 1rem; color: var(--on-surface-variant); font-weight: 600;">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}" style="border-bottom: 1px solid var(--surface-container);">
                            <td style="padding: 1rem; vertical-align: middle;" th:text="${#temporals.format(order.orderDate, 'MMM dd, yyyy HH:mm')}">Date</td>
                            <td style="padding: 1rem; vertical-align: middle; font-weight: 600;">
                                <a th:href="@{/product/{id}(id=${order.product.id})}" th:text="${order.product.name}" style="color: inherit; text-decoration: none;">Product Name</a>
                            </td>
                            <td style="padding: 1rem; vertical-align: middle; font-weight: bold; color: var(--primary);" th:text="${'$' + order.product.price}">Price</td>
                            <td style="padding: 1rem; vertical-align: middle;">
                                <span th:text="${order.status}" style="padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; background-color: var(--surface-low); color: var(--secondary); border: 1px solid rgba(83, 99, 79, 0.2); display: inline-block;">Status</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>

</body>

</html>
