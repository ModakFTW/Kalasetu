<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Secure Checkout | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content">
        <div style="margin-bottom: var(--spacing-sm); border-bottom: 1px solid var(--surface-container); padding-bottom: var(--spacing-sm);">
            <a th:href="@{/store}" style="color: var(--on-surface-variant); font-size: 0.9rem;">&larr; Back to Shop</a>
        </div>

        <h1 class="page-title font-serif">Secure Checkout</h1>

        <div class="product-detail-container" style="align-items: flex-start;">
            
            <div style="background: white; padding: var(--spacing-md); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-soft);">
                <h3 class="font-serif">Shipping Details</h3>
                <form action="/checkout" method="POST" style="display: flex; flex-direction: column; gap: var(--spacing-sm); margin-top: var(--spacing-sm);">
                    <div style="display: flex; gap: var(--spacing-sm);">
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">First Name</label>
                            <input type="text" placeholder="Jane" required />
                        </div>
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">Last Name</label>
                            <input type="text" placeholder="Doe" required />
                        </div>
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">Address</label>
                        <input type="text" placeholder="123 Artisan Way" required />
                    </div>
                    
                    <h3 class="font-serif" style="margin-top: var(--spacing-sm);">Payment Details</h3>
                    <div>
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">Card Number</label>
                        <input type="text" placeholder="0000 0000 0000 0000" />
                    </div>
                    <div style="display: flex; gap: var(--spacing-sm);">
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">Expiry</label>
                            <input type="text" placeholder="MM/YY" />
                        </div>
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem;">CVC</label>
                            <input type="text" placeholder="123" />
                        </div>
                    </div>
                    
                    <button type="submit" class="btn" style="width: 100%; margin-top: var(--spacing-md);"><span class="material-symbols-outlined" style="margin-right:0.5rem">lock</span> Confirm Payment</button>
                </form>
            </div>

            <div style="background: var(--surface-low); padding: var(--spacing-md); border-radius: var(--border-radius-lg);">
                <h3 class="font-serif">Order Summary</h3>
                <p style="color: var(--on-surface-variant); font-size: 0.9rem; margin-bottom: var(--spacing-md);">Your curated items are ready.</p>
                
                <!-- Mock Order Item -->
                <div style="display: flex; gap: var(--spacing-sm); border-bottom: 1px dashed var(--outline); padding-bottom: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
                    <img th:src="@{/images/blue glaze ug.avif}" style="width: 60px; height: 60px; border-radius: var(--border-radius-sm); object-fit: cover;" />
                    <div style="flex: 1;">
                        <strong style="display: block;">Blue Glaze Mug</strong>
                        <span style="font-size: 0.85rem; color: var(--secondary);">by Anya Sharma</span>
                    </div>
                    <div style="font-weight: bold;">$25.00</div>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--on-surface-variant);">
                    <span>Subtotal</span>
                    <span>$25.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--on-surface-variant);">
                    <span>Shipping</span>
                    <span>$5.00</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.25rem; border-top: 1px solid var(--outline); padding-top: 0.5rem;">
                    <span>Total</span>
                    <span style="color: var(--primary);">$30.00</span>
                </div>
                
            </div>
            
        </div>
    </div>

</body>

</html>
