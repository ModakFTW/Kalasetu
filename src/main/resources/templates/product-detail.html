<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title th:text="${product.name} + ' - Kalasetu'"></title>
</head>

<body>

    <div layout:fragment="content">

        <a href="/" style="display: inline-block; margin-bottom: 1rem;">&larr; Back to Store</a>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;">

            <!-- Left: Image Placeholder -->
            <div
                style="background-color: #e0e0e0; height: 400px; border-radius: var(--border-radius); display: flex; align-items: center; justify-content: center; color: #888;">
                [Product Image Placeholder]
            </div>

            <!-- Right: Details -->
            <div>
                <h1 th:text="${product.name}" style="font-size: 2rem; margin-bottom: 0.5rem;">Product Name</h1>

                <p style="font-size: 1.25rem; font-weight: bold; color: var(--pop-color); margin-bottom: 1.5rem;"
                    th:text="${'$' + product.price}">$0.00</p>

                <div
                    style="margin-bottom: 2rem; padding: 1rem; background-color: var(--surface-color); border-radius: var(--border-radius); border-left: 4px solid var(--accent-color);">
                    <p style="margin: 0; font-style: italic;">Created by</p>
                    <h3 th:text="${product.artist.name}" style="margin: 0;">Artist Name</h3>
                    <div style="margin-top: 0.5rem;">
                        <a th:href="@{/commission/request/{id}(id=${product.artist.id})}" class="btn"
                            style="padding: 0.5rem 1rem; font-size: 0.9rem;">Request Commission</a>
                    </div>
                </div>

                <div style="margin-bottom: 2rem;">
                    <h4
                        style="border-bottom: 1px solid var(--accent-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                        Description</h4>
                    <p th:text="${product.description}">Product description goes here.</p>
                </div>

                <div th:if="${not #maps.isEmpty(product.attributes)}">
                    <h4
                        style="border-bottom: 1px solid var(--accent-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                        Specifications</h4>
                    <ul style="list-style: none; padding: 0;">
                        <li th:each="attr : ${product.attributes}"
                            style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #ddd;">
                            <span style="font-weight: 500; color: var(--text-color);" th:text="${attr.key}">Key</span>
                            <span style="color: #666;" th:text="${attr.value}">Value</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
