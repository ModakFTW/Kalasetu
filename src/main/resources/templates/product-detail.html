<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title th:text="${product.name} + ' | KalaSetu'">Product Detail | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content">
        <div style="margin-bottom: var(--spacing-sm); border-bottom: 1px solid var(--surface-container); padding-bottom: var(--spacing-sm);">
            <a th:href="@{/store}" style="color: var(--on-surface-variant); font-size: 0.9rem;">&larr; Back to Shop</a>
        </div>

        <div class="product-detail-container">
            <div class="product-detail-image">
                <!-- Images served through the watermarked protected endpoint -->
                <img th:if="${product.imageUrl != null}"
                     th:src="@{/images/protected/{id}(id=${product.id})}"
                     th:alt="${product.name}"
                     style="width:100%; border-radius: var(--border-radius);" />
                <img th:unless="${product.imageUrl != null}"
                     src="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                     alt="Placeholder"
                     style="width:100%; border-radius: var(--border-radius);" />

                <!-- IP Protection badge -->
                <div style="margin-top: 0.6rem; display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--outline);">
                    <span class="material-symbols-outlined" style="font-size: 1rem; color: var(--secondary);">lock</span>
                    <span>Watermarked &amp; protected by KalaSetu IP Shield</span>
                </div>
            </div>
            
            <div class="product-meta">
                <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; color: var(--secondary); font-weight: 600; margin-bottom: 0.5rem;" th:text="${product.category.name}">Category</p>
                <h1 class="font-serif" th:text="${product.name}">Product Name</h1>
                <p style="font-size: 1.1rem; border-bottom: 1px solid var(--surface-container); padding-bottom: var(--spacing-sm); margin-bottom: var(--spacing-md);">
                    Crafted by <strong style="color: var(--on-surface);" th:text="${product.artist.name}">Artist Name</strong>
                </p>
                
                <div class="price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</div>
                <div class="description" th:text="${product.description}">Product description goes here. It is handcrafted and unique.</div>
                
                <div style="background: var(--surface-low); padding: var(--spacing-md); border-radius: var(--border-radius); border-left: 3px solid var(--primary); margin-bottom: var(--spacing-md);">
                    <h3 class="font-serif" style="font-size: 1.2rem;">Artisan Specs</h3>
                    <ul style="list-style: none; padding: 0;">
                        <li th:each="entry : ${product.attributes}" style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed rgba(0,0,0,0.1);">
                            <span style="color: var(--on-surface-variant);" th:text="${entry.key}">Key</span>
                            <strong th:text="${entry.value}">Value</strong>
                        </li>
                    </ul>
                </div>

                <div style="margin-top: var(--spacing-md); display: flex; flex-direction: column; gap: var(--spacing-sm);">
                    <a th:href="@{/checkout}" class="btn" style="text-align: center; width: 100%;"><span class="material-symbols-outlined" style="margin-right: 0.5rem;">lock</span> Safe Checkout</a>
                </div>
                
                <div style="margin-top: var(--spacing-md); font-size: 0.85rem; color: var(--outline); display: flex; align-items: center; gap: 0.5rem;">
                    <span class="material-symbols-outlined" style="font-size: 1.2rem; color: var(--secondary);">verified</span>
                    <span>100% Authentic. Directly supports the artisan.</span>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
