<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Register | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content" style="display: flex; justify-content: center; align-items: center; min-height: 70vh; margin: var(--spacing-lg) 0;">
        <div style="background: white; padding: var(--spacing-lg); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-soft); width: 100%; max-width: 500px;">
            <div style="text-align: center; margin-bottom: var(--spacing-md);">
                <h1 class="font-serif" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Join KalaSetu</h1>
                <p style="color: var(--on-surface-variant);">Create your account to start collecting or selling.</p>
            </div>

            <form action="/register" method="POST" style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                <div th:if="${error}" style="background-color: var(--primary); color: white; padding: 0.5rem; border-radius: var(--border-radius-sm); font-size: 0.9rem; text-align: center;" th:text="${error}"></div>
                
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Full Name</label>
                    <input type="text" name="name" placeholder="Alex Doe" required />
                </div>
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Email Address</label>
                    <input type="email" name="email" placeholder="alex@example.com" required />
                </div>
                <div>
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required />
                </div>
                
                <div style="margin-top: var(--spacing-sm);">
                    <label style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Account Type</label>
                    <div style="display: flex; gap: var(--spacing-sm);">
                        <label style="flex: 1; border: 1px solid var(--outline); padding: 1rem; border-radius: var(--border-radius-sm); cursor: pointer; text-align: center;">
                            <input type="radio" name="role" value="CUSTOMER" required style="width: auto; margin-right: 0.5rem;" />
                            <strong>Customer</strong>
                        </label>
                        <label style="flex: 1; border: 1px solid var(--outline); padding: 1rem; border-radius: var(--border-radius-sm); cursor: pointer; text-align: center;">
                            <input type="radio" name="role" value="ARTIST" style="width: auto; margin-right: 0.5rem;" />
                            <strong>Artist</strong>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: var(--spacing-sm);">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: var(--spacing-md); font-size: 0.9rem; color: var(--on-surface-variant);">
                Already have an account? <a th:href="@{/login}" style="font-weight: bold; color: var(--primary);">Login here</a>
            </div>
        </div>
    </div>

</body>

</html>
