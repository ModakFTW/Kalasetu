<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Meet Artisans | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content">
        <h1 class="page-title font-serif">Meet the Artisans</h1>
        <p style="text-align: center; color: var(--on-surface-variant); max-width: 600px; margin: 0 auto var(--spacing-lg);">
            Behind every piece is a master of their craft. Connect with our curated roster of global talent and commission bespoke custom works.
        </p>

        <div class="store-grid">
            <div th:each="artist : ${artists}" class="product-card" style="text-align: center; padding: var(--spacing-md); display: flex; flex-direction: column; align-items: center;">
                
                <a th:href="@{/artist/profile/{id}(id=${artist.id})}" style="text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; width: 100%;">
                    <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--surface-low); margin-bottom: var(--spacing-sm); display: flex; justify-content: center; align-items: center; border: 2px solid var(--primary-container);">
                        <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--primary);">person</span>
                    </div>
                    <h3 class="font-serif" th:text="${artist.name}" style="margin-bottom: 0.5rem; text-decoration: underline; text-decoration-color: transparent; transition: text-decoration-color 0.3s;" onmouseover="this.style.textDecorationColor='var(--primary)'" onmouseout="this.style.textDecorationColor='transparent'">Artist Name</h3>
                </a>
                <p style="color: var(--on-surface-variant); font-size: 0.95rem; margin-bottom: var(--spacing-md); line-height: 1.4;" th:text="${artist.bio}">Artist Bio.</p>
                
                <div style="margin-top: auto; width: 100%;">
                    <a th:href="@{/commission/request/{id}(id=${artist.id})}" class="btn btn-outline" style="width: 100%; font-size: 0.9rem; padding: 0.75rem;">
                        <span class="material-symbols-outlined" style="margin-right: 0.5rem; font-size: 1.1rem;">draw</span> Request Commission
                    </a>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
