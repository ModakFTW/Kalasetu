<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Submit Complaint | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content" style="display: flex; justify-content: center; align-items: flex-start; min-height: 70vh; margin-top: var(--spacing-lg);">

        <div style="background: white; padding: var(--spacing-lg); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-soft); width: 100%; max-width: 600px;">
            <div style="text-align: center; margin-bottom: var(--spacing-md);">
                <h1 class="font-serif" style="font-size: 2.5rem; margin-bottom: 0.5rem;" th:text="#{complaint.title}">Complaints</h1>
                <p style="color: var(--on-surface-variant);">
                    Please describe the issue you are facing. Our team will review it.
                </p>
            </div>

            <form th:action="@{/complaint/submit}" method="post" style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                <div>
                    <label for="subject" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;" th:text="#{complaint.subject}">Subject</label>
                    <input type="text" id="subject" name="subject" required th:placeholder="#{complaint.subject}" style="width: 100%; padding: 0.75rem; border: 1px solid var(--outline-variant); border-radius: var(--border-radius);" />
                </div>

                <div>
                    <label for="message" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;" th:text="#{complaint.message}">Message</label>
                    <textarea id="message" name="message" rows="8" required th:placeholder="#{complaint.message}" style="width: 100%; padding: 0.75rem; border: 1px solid var(--outline-variant); border-radius: var(--border-radius); font-family: inherit;"></textarea>
                </div>

                <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-sm);">
                    <button type="submit" class="btn" style="flex: 2;" th:text="#{complaint.submit}">Submit Complaint</button>
                    <a th:href="@{/profile}" class="btn btn-outline" style="flex: 1; text-align: center;" th:text="#{nav.back}">Cancel</a>
                </div>
            </form>
        </div>

    </div>

</body>

</html>
