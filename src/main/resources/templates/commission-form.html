<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Request Commission | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content" style="display: flex; justify-content: center; align-items: flex-start; min-height: 70vh; margin-top: var(--spacing-lg);">

        <div style="background: white; padding: var(--spacing-lg); border-radius: var(--border-radius-lg); box-shadow: var(--shadow-soft); width: 100%; max-width: 600px;">
            <div style="text-align: center; margin-bottom: var(--spacing-md);">
                <h1 class="font-serif" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Commission Request</h1>
                <p style="color: var(--on-surface-variant);">
                    Send a custom artwork request to <strong th:text="${artist.name}" style="color: var(--on-surface);">Artist Name</strong>
                </p>
            </div>

            <form th:action="@{/commission/request}" method="post" th:object="${commission}" style="display: flex; flex-direction: column; gap: var(--spacing-sm);">
                <input type="hidden" name="artistId" th:value="${artist.id}" />

                <div style="display: flex; gap: var(--spacing-sm);">
                    <div style="flex: 1;">
                        <label for="requesterName" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Your Name</label>
                        <input type="text" id="requesterName" th:field="*{requesterName}" required placeholder="e.g. Alex Doe" />
                    </div>
                    <div style="flex: 1;">
                        <label for="offeredBudget" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Your Budget ($)</label>
                        <input type="number" step="0.01" id="offeredBudget" th:field="*{offeredBudget}" placeholder="0.00" />
                    </div>
                </div>

                <div>
                    <label for="requesterContact" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">Contact Info <span style="font-weight: 400; color: var(--outline); font-size: 0.8rem;">(Email or Phone)</span></label>
                    <input type="text" id="requesterContact" th:field="*{requesterContact}" required placeholder="collector@example.com" />
                </div>

                <div>
                    <label for="message" style="display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem;">What would you like?</label>
                    <textarea id="message" th:field="*{message}" rows="5" required placeholder="Describe your vision, dimensions, colors, materials..."></textarea>
                </div>

                <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-sm);">
                    <button type="submit" class="btn" style="flex: 2;"><span class="material-symbols-outlined" style="margin-right: 0.5rem;">send</span> Send Request</button>
                    <a th:href="@{/artists}" class="btn btn-outline" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>

    </div>

</body>

</html>
