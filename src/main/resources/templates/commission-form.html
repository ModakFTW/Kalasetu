<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Request Commission - Kalasetu</title>
</head>

<body>

    <div layout:fragment="content" style="max-width: 600px; margin: 0 auto;">

        <div class="card" style="padding: 2rem;">
            <h1 style="text-align: center; margin-bottom: 0.5rem;">Commission Request</h1>
            <p style="text-align: center; color: var(--text-color); margin-bottom: 2rem;">
                Send a custom request to <strong th:text="${artist.name}">Artist Name</strong>
            </p>

            <form th:action="@{/commission/request}" method="post" th:object="${commission}">
                <input type="hidden" name="artistId" th:value="${artist.id}" />

                <div style="margin-bottom: 1.5rem;">
                    <label for="requesterName" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Your
                        Name</label>
                    <input type="text" id="requesterName" th:field="*{requesterName}" required
                        placeholder="e.g. Alex Doe" />
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label for="requesterContact"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Contact Info</label>
                    <input type="text" id="requesterContact" th:field="*{requesterContact}" required
                        placeholder="Email or Phone number" />
                    <small style="color: #666;">So the artist can reach you.</small>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label for="offeredBudget" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Your
                        Budget ($)</label>
                    <input type="number" step="0.01" id="offeredBudget" th:field="*{offeredBudget}"
                        placeholder="0.00" />
                </div>

                <div style="margin-bottom: 2rem;">
                    <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">What would you
                        like?</label>
                    <textarea id="message" th:field="*{message}" rows="6" required
                        placeholder="Describe your vision, size, colors, materials..."></textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 2;">Send Request</button>
                    <a href="/" class="btn"
                        style="flex: 1; background-color: var(--surface-color); color: var(--text-color); border: 1px solid var(--accent-color); text-align: center;">Cancel</a>
                </div>
            </form>
        </div>

    </div>

</body>

</html>
