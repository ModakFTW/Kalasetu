<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Storefront | KalaSetu</title>
</head>

<body>

    <div layout:fragment="content">
        <div th:if="${param.orderSuccess}" style="background-color: var(--secondary); color: white; padding: 1rem; border-radius: var(--border-radius); margin-bottom: var(--spacing-md); text-align: center; box-shadow: var(--shadow-soft); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <span class="material-symbols-outlined">verified</span> 
            <strong>Order Confirmed!</strong> Your handcrafted piece is being prepared for shipment.
        </div>


        
        <h1 class="page-title font-serif">Curated Collection</h1>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); border-bottom: 1px solid var(--surface-container); padding-bottom: var(--spacing-sm);">
            <div>
                <a th:href="@{/}" style="color: var(--on-surface-variant); font-size: 0.9rem;">Home</a> / <span style="font-weight: 600;">Shop</span>
            </div>
            <div>
                <span style="font-weight: 600; color: var(--on-surface-variant);" th:text="${products.size()} + ' Items'">0 Items</span>
            </div>
        </div>

        <div class="store-grid">
            <div th:each="product : ${products}" class="product-card">
                <a th:href="@{/products/{id}(id=${product.id})}">
                    <img th:if="${product.imageUrl != null}" th:src="@{/images/protected/{id}(id=${product.id})}" th:alt="${product.name}" class="product-image" />
                    <img th:unless="${product.imageUrl != null}" src="https://images.unsplash.com/photo-1513519245088-0e12902e5a38?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Placeholder" class="product-image" />
                </a>
                
                <div class="product-info">
                    <div class="product-artist" th:text="'by ' + ${product.artist.name}">by Artisan Name</div>
                    <a th:href="@{/products/{id}(id=${product.id})}">
                        <h3 class="product-title font-serif" th:text="${product.name}">Product Name</h3>
                    </a>
                    
                    <div class="product-footer">
                        <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</div>
                        <a th:href="@{/products/{id}(id=${product.id})}" style="color: var(--secondary); display: flex; align-items: center;">
                            <span class="material-symbols-outlined">shopping_bag</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
