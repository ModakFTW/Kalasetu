home.hero_join=कलाकार के रूप में जुड़ें
home.hero_img_alt=स्टूडियो में मिट्टी ढालता कलाकार
home.pillars_title=हमारे क्यूरेटोरियल स्तंभ
home.pillar1_title=प्रामाणिक
home.pillar1_desc=सीधे हाथों से घर तक। हम सुनिश्चित करते हैं कि हर वस्तु की क्षेत्रीय विरासत और व्यक्तिगत शिल्प कौशल के लिए पुष्टि की जाए।
home.pillar2_title=सशक्तिकरण
home.pillar2_desc=दूरदराज के गांव के उस्तादों और स्थानीय निर्माताओं को वैश्विक पहुंच प्रदान करके पारंपरिक शिल्प कौशल को बनाए रखें।
home.pillar3_title=सतत
home.pillar3_desc=पर्यावरण के अनुकूल सामग्री और नैतिक उत्पादन चक्र। सुंदरता जो पर्यावरण और उसके रचनाकारों का सम्मान करती है।
home.testimonials_small=प्रशंसापत्र
home.testimonials_title=हमारे वैश्विक समुदाय की आवाज़ें।
home.test1_quote="यहाँ खरीदारी करना एक बुटीक गैलरी में टहलने जैसा लगता है। हर कलाकार के पीछे की कहानी खरीदारी को बहुत सार्थक बनाती है।"
home.test1_role=कला सलाहकार
home.test2_quote="मुझे जो सिरेमिक सेट मिला है वह रसोई के सामान से कहीं अधिक है; यह बातचीत का एक हिस्सा है। आप मिट्टी में कलाकार की उंगलियों के निशान महसूस कर सकते हैं।"
home.test2_role=इंटीरियर आर्किटेक्ट
home.test3_quote="कलासेतु ने मुझे उन गांवों के बुनकरों से जोड़ा है जिनके बारे में मैंने केवल पढ़ा है। हाथ से कते रेशम की गुणवत्ता बेजोड़ है।"
home.test3_role=कपड़ा संग्राहक
home.cta_title=कुछ खास खोजने के लिए तैयार हैं?
home.cta_subtitle=हमारी डिजिटल गैलरी में कदम रखें और उन टुकड़ों की खोज करें जो आपके स्थान और आत्मा को परिभाषित करते हैं।
