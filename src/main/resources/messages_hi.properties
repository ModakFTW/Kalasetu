# Our Story Page
story.title=हमारी कहानी - कलासेतु
story.hero_title=संस्कृति और कैनवास को जोड़ना
story.hero_desc=कलासेतु, जिसका अनुवाद "कला का सेतु" है, स्थानीय कलाकारों के प्रामाणिक शिल्प को वैश्विक मंच पर लाकर उन्हें सशक्त बनाने के लिए समर्पित है। हम यह सुनिश्चित करने के लिए मौजूद हैं कि डिजिटल युग में संस्कृति फले-फूले।
story.pillar1_title=प्रामाणिकता पहले
story.pillar1_desc=हम पारंपरिक और समकालीन कलाकारों की कच्ची, अनफ़िल्टर्ड अभिव्यक्ति का जश्न मनाते हैं। कलासेतु पर हर टुकड़ा उसे बनाने वाले हाथों की एक सच्ची कहानी कहता है।
story.pillar2_title=रचनाकारों को सशक्त बनाना
story.pillar2_desc=कलासेतु कलाकारों को उनके कैटलॉग, मूल्य निर्धारण और अनुकूलन पर पूर्ण नियंत्रण देता है, जिससे वे अनुचित बिचौलियों के बिना सीधे अपने जुनून से उचित जीवन यापन कर सकते हैं।
story.pillar3_title=सामुदायिक संरक्षकता
story.pillar3_desc=हम सख्त, समुदाय-संचालित मॉडरेशन के साथ रचनाकार की आईपी की रक्षा करते हैं। हमारा मानना है कि कला का वास्तविक मूल्य मूल रचनाकार के सम्मान में निहित है।
story.voices_title=स्टूडियो से आवाज़ें
story.quote1_text="कलासेतु से पहले, मेरी पारंपरिक मिट्टी के बर्तन स्थानीय सड़क मेलों तक ही सीमित थे। अब, मुझे दुनिया भर के संग्राहकों से कस्टम अनुरोध मिलते हैं। यह मंच मेरे मूल्य निर्धारण का सम्मान करता है और मेरे डिजाइनों की रक्षा करता है।"
story.quote1_role=सिरेमिक मूर्तिकार और कुम्हार
story.quote2_text="यहाँ की आईपी सुरक्षा प्रणाली गेम-चेंजर है। एक डिजिटल चित्रकार के रूप में, अपने काम को लगातार चोरी होते देखना निराशाजनक था। कलासेतु पहला बाज़ार है जो सक्रिय रूप से मेरी मौलिकता का बचाव करता है।"
story.quote2_role=डिजिटल कैनवास चित्रकार

